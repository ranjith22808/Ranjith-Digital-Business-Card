    .fb { background: #3b5998; }

    .bottom-nav {

  <script>
    // Function to send your card link to a specific number typed in the box
    function sendDirectWA() {
      const num = document.getElementById('targetNumber').value;
      if (!num) {
        alert("Please enter a valid mobile number first.");
        return;
      }
      
      // Sanitizing number: removing any accidental spaces or dashes
      const cleanNum = num.replace(/\D/g, '');
      const finalNum = cleanNum.startsWith('91') ? cleanNum : '91' + cleanNum;
      
      const message = encodeURIComponent("Hi, check out my Digital Business Card here: https://ranjithrk.netlify.app/");
      window.open(`https://wa.me/${finalNum}?text=${message}`, '_blank');
    }

    // Function for Native Phone Share (Bottom Nav)
    function shareNative() {
      const shareData = {
        title: 'Ranjithkumar R - Digital Card',
        text: 'Save my contact and check my services:',
        url: 'https://ranjithrk.netlify.app/'
      };

      if (navigator.share) {
        navigator.share(shareData);
      } else {
        window.open(`https://wa.me/?text=Check%20out%20my%20Digital%20Business%20Card:%20https://ranjithrk.netlify.app/`, '_blank');
      }
    }

    // Inline Service Worker for PWA
    if ('serviceWorker' in navigator) {
      const swCode = `
        self.addEventListener('install', (e) => self.skipWaiting());
        self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
      `;
      const blob = new Blob([swCode], { type: 'text/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
  </script>

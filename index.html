<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranjithkumar R - Digital Card</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00b09b">
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <script>
    // Direct WhatsApp Send Logic
    function sendDirectWA() {
      const numInput = document.getElementById('targetNumber');
      const num = numInput.value;
      if (!num) return alert("Please enter a number");
      const cleanNum = num.replace(/\D/g, '');
      const finalNum = cleanNum.startsWith('91') ? cleanNum : '91' + cleanNum;
      const message = encodeURIComponent("Hi, check out my Digital Business Card: https://ranjithrk.netlify.app/");
      window.open(`https://wa.me/${finalNum}?text=${message}`, '_blank');
    }

    // Native Share Logic
    function shareNative() {
      if (navigator.share) {
        navigator.share({
          title: 'Ranjithkumar R',
          url: 'https://ranjithrk.netlify.app/'
        });
      }
    }

    // PHYSICAL SERVICE WORKER REGISTRATION
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW Registered'))
          .catch(err => console.log('SW Register Failed', err));
      });
    }
  </script>
</body>
</html>
